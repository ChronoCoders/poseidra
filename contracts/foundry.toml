[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
optimizer        = true
optimizer_runs   = 1000
via_ir           = false
solc_version     = "0.8.24"
evm_version      = "paris"

[profile.default.fuzz]
runs = 256

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true

[lint]
severity = ["high", "medium"]
